{% load static %}
<html>
<head>
    <link rel="stylesheet" href="{% static 'deliverys/css/style.css' %}">
</head>
<body>
<nav>
    <a href="{% url 'delivery_list' %}">Home</a>
    {% if user.is_authenticated %}
    <a href="{% url 'delivery_add' %}">Add Delivery</a>
    <span>Welcome, {{ user.username }}!</span>
    <form action="{% url 'logout' %}" method="post">{% csrf_token %}<button type="submit">Logout</button></form>
    {% else %}
    <a href="{% url 'login' %}">Login</a>
    {% endif %}
</nav>
{% block content %}{% endblock %}
</body>
</html>
